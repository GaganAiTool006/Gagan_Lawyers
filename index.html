<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vakil Connect — Find the Right Lawyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0C2233;
    --navy-light:#16384F;
    --blue:#2D6E5E;
    --blue-light:#E7F1EC;
    --blue-mid:#9FC9B9;
    --grey-50:#F8F6F1;
    --grey-100:#EFEAE0;
    --grey-300:#D8D1C2;
    --grey-500:#8C8474;
    --grey-700:#4B463B;
    --ink:#1B1B17;
    --white:#FFFFFF;
    --gold:#B8862F;
    --success:#2D6E5E;
    --radius:10px;
    --radius-lg:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Plus Jakarta Sans', sans-serif;
    background:var(--grey-50);
    color:var(--ink);
    line-height:1.5;
  }
  h1,h2,h3,.serif{font-family:'Fraunces', serif; font-optical-sizing:auto;}
  a{text-decoration:none; color:inherit;}
  button{font-family:inherit; cursor:pointer; border:none;}
  img{max-width:100%; display:block;}
  .app{min-height:100vh; display:flex; flex-direction:column;}

  /* ===== Top bar ===== */
  .topbar{
    background:var(--navy);
    color:var(--white);
    padding:14px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:10px; font-size:20px; font-weight:600;}
  .brand .mark{
    width:32px; height:32px; border-radius:8px;
    background:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--navy); font-size:18px;
  }
  .nav-links{display:flex; gap:28px; align-items:center; font-size:14px;}
  .nav-links a{opacity:.85; transition:opacity .15s;}
  .nav-links a:hover{opacity:1;}
  .role-switch{display:flex; gap:8px; background:rgba(255,255,255,.08); padding:4px; border-radius:8px;}
  .role-switch button{
    padding:6px 14px; border-radius:6px; font-size:13px; color:var(--white); background:transparent; opacity:.7;
  }
  .role-switch button.active{background:var(--blue); opacity:1; font-weight:600;}

  .container{max-width:1140px; margin:0 auto; padding:0 24px; width:100%;}
  main{flex:1;}

  /* ===== Hero ===== */
  .hero{
    background:
      linear-gradient(125deg, rgba(12,34,51,.94) 0%, rgba(22,56,79,.88) 55%, rgba(12,34,51,.96) 100%),
      url('https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&w=1600&q=60');
    background-size:cover;
    background-position:center;
    color:var(--white);
    padding:64px 0 90px;
  }
  .hero-grid{display:grid; grid-template-columns:1.1fr .9fr; gap:48px; align-items:center;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--blue-mid); font-weight:600; margin-bottom:18px;
  }
  .eyebrow::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--gold);}
  .hero h1{font-size:42px; font-weight:600; line-height:1.15; margin-bottom:18px;}
  .hero p.lead{font-size:16px; color:var(--blue-mid); max-width:480px; margin-bottom:32px;}
  .hero-cta{display:flex; gap:12px; margin-bottom:8px;}
  .search-card{
    background:var(--white); border-radius:var(--radius-lg);
    padding:20px; box-shadow:0 20px 50px rgba(0,0,0,.25);
    display:flex; flex-direction:column; gap:12px;
  }
  .search-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:11px; color:var(--grey-500); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .field select, .field input{
    padding:10px 12px; border:1px solid var(--grey-300); border-radius:8px; font-size:14px; color:var(--ink); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 22px; border-radius:8px; font-size:14px; font-weight:600;
    transition:transform .12s, box-shadow .12s;
  }
  .btn-primary{background:var(--blue); color:var(--white);}
  .btn-primary:hover{box-shadow:0 8px 20px rgba(37,99,235,.35);}
  .btn-gold{background:var(--gold); color:var(--navy);}
  .btn-outline{background:transparent; border:1px solid var(--grey-300); color:var(--ink);}
  .btn-outline.light{border:1px solid rgba(255,255,255,.35); color:var(--white);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 14px; font-size:13px;}

  .hero-illustration{
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    border-radius:var(--radius-lg); padding:24px;
  }
  .stat-row{display:flex; gap:24px; margin-top:18px;}
  .stat{flex:1;}
  .stat .num{font-family:'Fraunces',serif; font-size:26px; font-weight:600; color:var(--white);}
  .stat .lbl{font-size:12px; color:var(--blue-mid);}

  /* ===== Sections ===== */
  .section{padding:56px 0;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px;}
  .section-head h2{font-size:26px; font-weight:600;}
  .section-head .sub{color:var(--grey-500); font-size:14px; margin-top:4px;}

  .cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}

  .feature-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  .feature-card{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); overflow:hidden; transition:transform .15s, box-shadow .15s;}
  .feature-card:hover{transform:translateY(-2px); box-shadow:0 12px 30px rgba(12,34,51,.08);}
  .feature-card img{width:100%; height:140px; object-fit:cover;}
  .feature-card h3{font-size:15px; font-weight:600; padding:16px 16px 4px;}
  .feature-card p{font-size:13px; color:var(--grey-500); padding:0 16px 16px;}
  .cat-card{
    background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg);
    overflow:hidden; transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s; cursor:pointer;
  }
  .cat-card:hover{transform:translateY(-4px); box-shadow:0 14px 32px rgba(12,34,51,.1);}
  .cat-img-wrap{position:relative; height:90px; overflow:hidden;}
  .cat-img{width:100%; height:100%; object-fit:cover; transition:transform .4s ease;}
  .cat-card:hover .cat-img{transform:scale(1.08);}
  .cat-card .icon{
    width:34px;height:34px;border-radius:9px; background:var(--gold); color:var(--navy);
    display:flex;align-items:center;justify-content:center; font-weight:700; font-size:12px;
    position:absolute; left:14px; bottom:-15px; box-shadow:0 4px 10px rgba(0,0,0,.18); border:2px solid var(--white);
  }
  .cat-card .cat-body{padding:22px 16px 16px;}
  .cat-card h3{font-size:15px; font-weight:600; margin-bottom:4px;}
  .cat-card p{font-size:12px; color:var(--grey-500);}

  .lawyer-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  .lawyer-card{
    background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg);
    padding:20px; display:flex; flex-direction:column; gap:12px; transition:box-shadow .15s, transform .15s;
  }
  .lawyer-card:hover{box-shadow:0 12px 30px rgba(15,37,64,.08); transform:translateY(-2px);}
  .lawyer-top{display:flex; gap:12px; align-items:center;}
  .avatar{
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(145deg, var(--navy) 0%, var(--navy-light) 100%);
    color:var(--blue-mid);
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:18px; flex-shrink:0;
    border:1px solid rgba(255,255,255,.08);
  }
  .lawyer-name{font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .verified{
    width:15px; height:15px; border-radius:50%; background:var(--success); color:var(--white);
    display:flex; align-items:center; justify-content:center; font-size:9px; flex-shrink:0;
  }
  .lawyer-meta{font-size:12px; color:var(--grey-500);}
  .tag-row{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{background:var(--blue-light); color:var(--blue); font-size:11px; font-weight:600; padding:4px 9px; border-radius:6px;}
  .lawyer-stats{display:flex; justify-content:space-between; align-items:center; font-size:13px; border-top:1px solid var(--grey-100); padding-top:12px;}
  .rating{color:var(--gold); font-weight:600;}
  .fee{font-weight:600; color:var(--navy);}

  .trust-strip{
    background:
      linear-gradient(rgba(248,246,241,.93), rgba(248,246,241,.93)),
      url('https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=1600&q=50');
    background-size:cover; background-position:center;
    border-top:1px solid var(--grey-100); border-bottom:1px solid var(--grey-100); padding:28px 0;
  }
  .trust-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:24px; text-align:center;}
  .trust-grid .num{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--navy);}
  .trust-grid .lbl{font-size:12px; color:var(--grey-500); margin-top:2px;}

  footer{background:var(--navy); color:var(--blue-mid); padding:36px 0; font-size:13px; margin-top:auto;}
  .footer-grid{display:flex; justify-content:space-between; align-items:center;}

  /* ===== Search results page ===== */
  .search-layout{display:grid; grid-template-columns:260px 1fr; gap:28px; padding:32px 0;}
  .filters-card{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:20px; align-self:start; position:sticky; top:80px;}
  .filters-card h3{font-size:14px; margin-bottom:16px;}
  .filter-group{margin-bottom:20px;}
  .filter-group label{font-size:12px; font-weight:600; color:var(--grey-700); display:block; margin-bottom:8px;}
  .chip-list{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    border:1px solid var(--grey-300); border-radius:16px; padding:5px 12px; font-size:12px; background:var(--white); color:var(--grey-700);
  }
  .chip.sel{background:var(--blue); border-color:var(--blue); color:var(--white);}
  .results-list{display:flex; flex-direction:column; gap:14px;}
  .result-card{
    background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:18px;
    display:grid; grid-template-columns:auto 1fr auto; gap:18px; align-items:center;
  }

  /* ===== Lawyer profile page ===== */
  .profile-head{background:var(--white); border-bottom:1px solid var(--grey-100); padding:36px 0;}
  .profile-top{display:flex; gap:20px; align-items:flex-start;}
  .avatar-lg{width:88px;height:88px; border-radius:50%; background:linear-gradient(145deg, var(--navy) 0%, var(--navy-light) 100%); color:var(--blue-mid); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:30px; font-weight:600; flex-shrink:0; border:1px solid rgba(255,255,255,.08);}
  .profile-tabs{display:flex; gap:24px; border-bottom:1px solid var(--grey-100); margin-top:24px;}
  .ptab{padding:10px 2px; font-size:14px; color:var(--grey-500); border-bottom:2px solid transparent; font-weight:500;}
  .ptab.active{color:var(--blue); border-color:var(--blue); font-weight:600;}
  .profile-body{display:grid; grid-template-columns:1fr 320px; gap:32px; padding:32px 0;}
  .info-card{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:22px; margin-bottom:18px;}
  .info-card h3{font-size:15px; margin-bottom:10px;}
  .review-item{border-bottom:1px solid var(--grey-100); padding:14px 0;}
  .review-item:last-child{border-bottom:none;}
  .booking-card{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:22px; position:sticky; top:80px;}
  .slot-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:14px 0;}
  .slot{padding:9px; border:1px solid var(--grey-300); border-radius:8px; font-size:12px; text-align:center; background:var(--white);}
  .slot.sel{background:var(--blue); color:var(--white); border-color:var(--blue);}
  .mode-toggle{display:flex; gap:8px; margin-bottom:14px;}
  .mode-toggle button{flex:1; padding:9px; border:1px solid var(--grey-300); border-radius:8px; font-size:13px; background:var(--white);}
  .mode-toggle button.sel{background:var(--blue-light); border-color:var(--blue); color:var(--blue); font-weight:600;}

  /* ===== Dashboards ===== */
  .dash-layout{display:grid; grid-template-columns:230px 1fr; min-height:calc(100vh - 60px);}
  .sidebar{background:var(--white); border-right:1px solid var(--grey-100); padding:24px 16px;}
  .side-link{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; font-size:14px; color:var(--grey-700); margin-bottom:2px; font-weight:500;
  }
  .side-link .dot{width:6px;height:6px;border-radius:50%; background:var(--grey-300);}
  .side-link.active{background:var(--blue-light); color:var(--blue); font-weight:600;}
  .side-link.active .dot{background:var(--blue);}
  .dash-main{padding:28px 32px;}
  .dash-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;}
  .dash-head h2{font-size:22px;}
  .card-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px;}
  .stat-card{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:18px;}
  .stat-card .num{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--navy);}
  .stat-card .lbl{font-size:12px; color:var(--grey-500); margin-top:2px;}
  .panel{background:var(--white); border:1px solid var(--grey-100); border-radius:var(--radius-lg); padding:22px; margin-bottom:18px;}
  .panel h3{font-size:15px; margin-bottom:14px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--grey-500); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; padding:8px 10px; border-bottom:1px solid var(--grey-100);}
  td{padding:12px 10px; border-bottom:1px solid var(--grey-100);}
  .badge{font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px;}
  .badge.active{background:#E5F4ED; color:var(--success);}
  .badge.pending{background:#FCEFD8; color:var(--gold);}
  .badge.closed{background:var(--grey-100); color:var(--grey-500);}

  .case-cols{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .case-col h4{font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--grey-500); margin-bottom:10px;}
  .case-mini{background:var(--grey-50); border:1px solid var(--grey-100); border-radius:8px; padding:12px; margin-bottom:8px;}
  .case-mini .t{font-size:13px; font-weight:600; margin-bottom:4px;}
  .case-mini .m{font-size:11px; color:var(--grey-500);}

  .doc-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--grey-100);}
  .doc-row:last-child{border-bottom:none;}
  .doc-icon{width:32px;height:32px; border-radius:7px; background:var(--blue-light); color:var(--blue); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;}

  .chat-window{display:grid; grid-template-columns:1fr; gap:10px; max-height:340px; overflow-y:auto; padding:6px;}
  .msg{max-width:70%; padding:10px 14px; border-radius:12px; font-size:13px;}
  .msg.me{background:var(--blue); color:var(--white); align-self:flex-end; margin-left:auto;}
  .msg.them{background:var(--grey-100); color:var(--ink);}
  .video-mock{background:var(--navy); border-radius:var(--radius-lg); aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--white); position:relative;}
  .video-controls{position:absolute; bottom:14px; display:flex; gap:10px; left:50%; transform:translateX(-50%);}
  .vc-btn{width:42px;height:42px; border-radius:50%; background:rgba(255,255,255,.15); color:var(--white); display:flex; align-items:center; justify-content:center;}
  .vc-btn.end{background:#D14444;}

  .hidden{display:none !important;}

  @media(max-width:900px){
    .hero-grid{grid-template-columns:1fr;}
    .lawyer-grid{grid-template-columns:repeat(2,1fr);}
    .cat-grid{grid-template-columns:repeat(2,1fr);}
    .search-layout, .dash-layout, .profile-body{grid-template-columns:1fr;}
    .case-cols{grid-template-columns:1fr;}
    .card-row{grid-template-columns:repeat(2,1fr);}
    .dash-layout{grid-template-columns:1fr;}
    .sidebar{
      display:flex; flex-direction:row; overflow-x:auto; gap:4px;
      border-right:none; border-bottom:1px solid var(--grey-100); padding:12px 16px;
      position:sticky; top:60px; z-index:30; background:var(--white);
    }
    .side-link{white-space:nowrap; flex-shrink:0;}
    .booking-card{position:static;}
    .filters-card{position:static;}
  }

  @media(max-width:640px){
    .topbar{padding:12px 16px;}
    .brand{font-size:16px; gap:8px;}
    .brand .mark{width:28px; height:28px; font-size:15px;}
    .nav-links{gap:8px;}
    .nav-links > a{display:none;}
    .role-switch{gap:2px; padding:3px;}
    .role-switch button{padding:6px 9px; font-size:11px;}

    .container{padding:0 16px;}
    .hero{padding:36px 0 56px;}
    .hero h1{font-size:27px; line-height:1.22;}
    .hero p.lead{font-size:14px; max-width:none;}
    .eyebrow{font-size:11px;}
    .hero-illustration{padding:16px;}
    .hero-illustration img{height:110px;}
    .stat-row{flex-wrap:wrap; gap:16px;}
    .stat{flex:1 1 40%;}
    .stat .num{font-size:21px;}
    .hero-cta{flex-direction:column; gap:10px;}
    .hero-cta .btn{width:100%;}

    .section{padding:36px 0;}
    .section-head{flex-direction:column; align-items:flex-start; gap:6px;}
    .section-head h2{font-size:21px;}
    .trust-grid{grid-template-columns:repeat(2,1fr); gap:18px;}
    .cat-grid{grid-template-columns:repeat(2,1fr); gap:12px;}
    .cat-card .cat-body{padding:18px 14px 14px;}
    .lawyer-grid{grid-template-columns:1fr;}
    .feature-grid{grid-template-columns:1fr;}

    .search-row{grid-template-columns:1fr;}

    .result-card{grid-template-columns:1fr; text-align:left;}
    .result-card > div:last-child{text-align:left; display:flex; align-items:center; justify-content:space-between; width:100%;}

    .profile-top{flex-direction:column; align-items:flex-start; gap:14px;}
    .profile-tabs{gap:16px; overflow-x:auto;}
    .profile-body{padding:24px 0;}

    .dash-main{padding:18px 16px;}
    .dash-head{flex-direction:column; align-items:flex-start; gap:10px;}
    .card-row{grid-template-columns:repeat(2,1fr); gap:10px;}
    .stat-card{padding:14px;}
    .stat-card .num{font-size:19px;}

    table{display:block; overflow-x:auto; white-space:nowrap;}
    .panel{padding:16px;}

    .slot-grid{grid-template-columns:repeat(2,1fr);}
    .case-cols{grid-template-columns:1fr;}

    .footer-grid{flex-direction:column; gap:6px; text-align:center;}
    .video-controls{gap:8px;}
  }

  /* ===== Animations ===== */
  @keyframes fadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes scaleIn{ from{opacity:0; transform:scale(.94);} to{opacity:1; transform:scale(1);} }
  @keyframes floatSlow{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes pulseDot{ 0%,100%{box-shadow:0 0 0 0 rgba(45,110,94,.45);} 50%{box-shadow:0 0 0 6px rgba(45,110,94,0);} }
  @keyframes shimmer{ 0%{background-position:-200px 0;} 100%{background-position:calc(200px + 100%) 0;} }

  #mainArea{animation:fadeIn .35s ease;}
  .hero .eyebrow{animation:fadeUp .5s ease both;}
  .hero h1{animation:fadeUp .55s ease both .05s;}
  .hero p.lead{animation:fadeUp .6s ease both .1s;}
  .hero-cta{animation:fadeUp .6s ease both .15s;}
  .hero .stat-row{animation:fadeUp .6s ease both .2s;}
  .hero-illustration{animation:scaleIn .6s ease both .15s;}

  .reveal{opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}
  .reveal-stagger > *{opacity:0; transform:translateY(16px); transition:opacity .5s ease, transform .5s ease;}
  .reveal-stagger.in > *{opacity:1; transform:translateY(0);}
  .reveal-stagger.in > *:nth-child(1){transition-delay:.02s;}
  .reveal-stagger.in > *:nth-child(2){transition-delay:.08s;}
  .reveal-stagger.in > *:nth-child(3){transition-delay:.14s;}
  .reveal-stagger.in > *:nth-child(4){transition-delay:.2s;}
  .reveal-stagger.in > *:nth-child(5){transition-delay:.26s;}

/* ===================== ROUTER ===================== */
function goTo(page){
  state.page = page;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setRole(role){
  state.role = role;
  document.querySelectorAll('.role-switch button').forEach(b=>b.classList.toggle('active', b.dataset.role===role));
  if(role==='client') goTo('clientDash');
  if(role==='lawyer') goTo('lawyerDash');
  if(role==='admin') goTo('adminDash');
}

function render(){
  const area = document.getElementById('mainArea');
  const footer = document.getElementById('siteFooter');
  const page = state.page || 'landing';
  const dashPages = ['clientDash','lawyerDash','adminDash'];
  footer.classList.toggle('hidden', dashPages.includes(page) || page==='consult');

  switch(page){
    case 'landing': area.innerHTML = renderLanding(); break;
    case 'search': area.innerHTML = renderSearch(); break;
    case 'lawyerProfile': area.innerHTML = renderLawyerProfile(); break;
    case 'clientDash': area.innerHTML = renderClientDash(); break;
    case 'lawyerDash': area.innerHTML = renderLawyerDash(); break;
    case 'adminDash': area.innerHTML = renderAdminDash(); break;
    case 'consult': area.innerHTML = renderConsult(); break;
    default: area.innerHTML = renderLanding();
  }

  // restart fade-in animation on page change
  area.style.animation = 'none';
  requestAnimationFrame(()=>{ area.style.animation = ''; });

  setupRevealObserver();
}

function setupRevealObserver(){
  const targets = document.querySelectorAll('.reveal, .reveal-stagger');
  if(!targets.length) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('in');
        obs.unobserve(entry.target);
      }
    });
  }, {threshold:0.12});
  targets.forEach(t=>obs.observe(t));
}

render();
</script>
